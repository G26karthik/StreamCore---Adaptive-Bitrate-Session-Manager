version: '3.8'

services:
  streamcore:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - stream-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - stream-net

networks:
  stream-net:
    driver: bridge
